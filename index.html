<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Retail SAP - Material de apoyo</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500&display=swap" rel="stylesheet"/>
<style>
  /* =====================================================
     CONFIGURACIÓN DE COLORES Y TIPOGRAFÍA
     ===================================================== */
  :root {
    --blue: #185FA5;
    --blue-light: #E6F1FB;
    --blue-mid: #378ADD;
    --green-light: #EAF3DE;
    --green: #3B6D11;
    --bg: #F4F4F2;
    --bg-card: #FFFFFF;
    --border: rgba(0,0,0,0.10);
    --border-hover: rgba(0,0,0,0.18);
    --text-primary: #1a1a1a;
    --text-secondary: #555;
    --text-muted: #999;
    --radius-md: 8px;
    --radius-lg: 12px;
    --font: 'IBM Plex Sans', sans-serif;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; font-family: var(--font); background: var(--bg); color: var(--text-primary); }

  /* =====================================================
     LAYOUT PRINCIPAL
     ===================================================== */
  .portal { display: flex; height: 100vh; overflow: hidden; }

  /* =====================================================
     SIDEBAR
     ===================================================== */
  .sidebar {
    width: 270px;
    min-width: 270px;
    background: var(--bg-card);
    border-right: 0.5px solid var(--border);
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  .sidebar-header {
    padding: 18px 18px 14px;
    border-bottom: 0.5px solid var(--border);
  }
  .sidebar-logo {
    font-size: 10px;
    font-weight: 500;
    color: var(--text-muted);
    letter-spacing: 0.1em;
    text-transform: uppercase;
    margin-bottom: 4px;
  }
  .sidebar-title {
    font-size: 14px;
    font-weight: 500;
    color: var(--text-primary);
  }
  .sidebar-list { overflow-y: auto; flex: 1; padding: 8px 0; }
  .sidebar-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 9px 18px;
    cursor: pointer;
    border-left: 2px solid transparent;
    transition: background 0.12s;
  }
  .sidebar-item:hover { background: #f0f4f8; }
  .sidebar-item.active {
    background: var(--blue-light);
    border-left: 2px solid var(--blue);
  }
  .sidebar-num {
    font-size: 10px;
    font-weight: 500;
    color: var(--text-muted);
    min-width: 20px;
    flex-shrink: 0;
  }
  .sidebar-item.active .sidebar-num { color: var(--blue); }
  .sidebar-label { font-size: 12px; color: var(--text-secondary); line-height: 1.35; flex: 1; }
  .sidebar-item.active .sidebar-label { color: var(--blue); font-weight: 500; }
  .sidebar-badge {
    font-size: 10px;
    font-weight: 500;
    padding: 1px 7px;
    border-radius: 20px;
    background: var(--blue-light);
    color: var(--blue);
    flex-shrink: 0;
  }

  /* =====================================================
     ÁREA PRINCIPAL
     ===================================================== */
  .main { flex: 1; overflow-y: auto; display: flex; flex-direction: column; min-width: 0; }
  .main-header {
    background: var(--bg-card);
    border-bottom: 0.5px solid var(--border);
    padding: 20px 32px 18px;
    position: sticky;
    top: 0;
    z-index: 10;
  }
  .breadcrumb { font-size: 11px; color: var(--text-muted); margin-bottom: 6px; }
  .main-title { font-size: 22px; font-weight: 500; color: var(--text-primary); }

  .main-body { padding: 24px 32px; flex: 1; max-width: 860px; }

  /* =====================================================
     CAJA OBJETIVO
     ===================================================== */
  .objective-box {
    background: var(--bg-card);
    border: 0.5px solid var(--border);
    border-radius: var(--radius-lg);
    padding: 16px 18px;
    margin-bottom: 28px;
    display: flex;
    gap: 12px;
    align-items: flex-start;
  }
  .obj-icon {
    width: 32px;
    height: 32px;
    background: var(--green-light);
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }
  .obj-label { font-size: 11px; font-weight: 500; color: var(--text-secondary); margin-bottom: 4px; }
  .obj-text { font-size: 13px; color: var(--text-primary); line-height: 1.6; }

  /* =====================================================
     LISTA DE VIDEOS
     ===================================================== */
  .videos-section-title {
    font-size: 15px;
    font-weight: 500;
    color: var(--text-primary);
    margin-bottom: 14px;
  }
  .video-list { display: flex; flex-direction: column; gap: 10px; }
  .video-card {
    background: var(--bg-card);
    border: 0.5px solid var(--border);
    border-radius: var(--radius-md);
    padding: 14px 18px;
    display: flex;
    align-items: center;
    gap: 14px;
    cursor: pointer;
    text-decoration: none;
    transition: border-color 0.12s, background 0.12s;
  }
  .video-card:hover {
    background: #f7fafd;
    border-color: var(--border-hover);
  }
  .video-play {
    width: 36px;
    height: 36px;
    background: var(--blue);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }
  .play-tri {
    width: 0; height: 0;
    border-top: 7px solid transparent;
    border-bottom: 7px solid transparent;
    border-left: 12px solid white;
    margin-left: 3px;
  }
  .video-info { flex: 1; min-width: 0; }
  .video-name { font-size: 13px; color: var(--text-primary); line-height: 1.4; }
  .video-meta { font-size: 11px; color: var(--text-muted); margin-top: 3px; }
  .video-arrow { font-size: 18px; color: var(--text-muted); }

  /* =====================================================
     ESTADO VACÍO
     ===================================================== */
  .empty-state {
    text-align: center;
    padding: 56px 24px;
    color: var(--text-muted);
    font-size: 13px;
    line-height: 1.7;
    background: var(--bg-card);
    border: 0.5px dashed var(--border);
    border-radius: var(--radius-lg);
  }
  .empty-icon { font-size: 32px; margin-bottom: 12px; }

  /* =====================================================
     SCROLLBAR
     ===================================================== */
  .sidebar-list::-webkit-scrollbar { width: 4px; }
  .sidebar-list::-webkit-scrollbar-track { background: transparent; }
  .sidebar-list::-webkit-scrollbar-thumb { background: #ddd; border-radius: 4px; }
</style>
</head>
<body>

<div class="portal">
  <div class="sidebar">
    <div class="sidebar-header">
      <div class="sidebar-logo">Material de apoyo</div>
      <div class="sidebar-title">Retail SAP</div>
    </div>
    <div class="sidebar-list" id="sidebarList"></div>
  </div>

  <div class="main">
    <div class="main-header">
      <div class="breadcrumb">Inicio / Retail SAP - Material de apoyo</div>
      <div class="main-title" id="mainTitle"></div>
    </div>
    <div class="main-body">
      <div class="objective-box">
        <div class="obj-icon">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
            <circle cx="8" cy="8" r="6" stroke="#3B6D11" stroke-width="1.5"/>
            <path d="M5 8l2 2 4-4" stroke="#3B6D11" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </div>
        <div>
          <div class="obj-label">Objetivo</div>
          <div class="obj-text" id="objText"></div>
        </div>
      </div>
      <div class="videos-section-title" id="videosSectionTitle"></div>
      <div class="video-list" id="videoList"></div>
    </div>
  </div>
</div>

<script>
/* =====================================================
   ✏️  CONFIGURACIÓN DE MÓDULOS Y VIDEOS
   =====================================================
   Para agregar videos a un módulo:
   1. Busca el módulo por su número
   2. Dentro de "videos", agrega un objeto con:
      - name: nombre del video (como quieres que aparezca)
      - url:  link directo de SharePoint al video

   Ejemplo:
   { name: "Nombre del video", url: "https://tuempresa.sharepoint.com/..." }

   Si un módulo no tiene videos todavía, deja videos: []
   y simplemente no aparecerá contenido hasta que agregues uno.
   ===================================================== */

const modules = [
  {
    num: "01",
    label: "Carga masiva de clientes",
    obj: "Aprenderás a ejecutar la carga masiva de clientes en SAP, incluyendo la visualización de datos clave como interlocutores, RFC, CURP y condiciones de pago.",
    videos: [
      { name: "Visualiza clientes y sus interlocutores en SAP", url: "PEGA_AQUI_EL_LINK_DE_SHAREPOINT" },
      { name: "¿Qué es el interlocutor de un cliente y cómo encontrarlos en SAP?", url: "PEGA_AQUI_EL_LINK_DE_SHAREPOINT" },
      { name: "Visualizar el RFC, el CURP o el NIF de un cliente en SAP", url: "PEGA_AQUI_EL_LINK_DE_SHAREPOINT" },
      { name: "¿Cómo conocer la condición de pago del cliente en SAP?", url: "PEGA_AQUI_EL_LINK_DE_SHAREPOINT" }
    ]
  },
  {
    num: "02",
    label: "Gestión de precios",
    obj: "Comprenderás cómo gestionar y consultar precios dentro del sistema SAP.",
    videos: []
  },
  {
    num: "03",
    label: "Venta de mercancía con inventario",
    obj: "Procesarás ventas de mercancía con control de inventario en SAP.",
    videos: []
  },
  {
    num: "04",
    label: "Venta con entrega en sucursal",
    obj: "Gestionarás ventas con entrega directa en sucursal usando SAP.",
    videos: []
  },
  {
    num: "05",
    label: "Venta terceros POS",
    obj: "Realizarás ventas a terceros a través del punto de venta en SAP.",
    videos: []
  },
  {
    num: "06",
    label: "Vta 3r SAP - Solped / Traspaso",
    obj: "Ejecutarás el proceso de venta a terceros con solicitud de pedido y traspaso en SAP.",
    videos: []
  },
  {
    num: "07",
    label: "Vta 3r SAP - Solped / Compra Pro",
    obj: "Gestionarás ventas a terceros con solicitud de pedido y compra pro en SAP.",
    videos: []
  },
  {
    num: "08",
    label: "Traspasos directos MM con CP",
    obj: "Realizarás traspasos directos en gestión de materiales con centro de producción.",
    videos: []
  },
  {
    num: "09",
    label: "Facturación anticipada",
    obj: "Procesarás facturas anticipadas dentro del flujo de ventas en SAP.",
    videos: []
  },
  {
    num: "10",
    label: "Venta exportación con inventario",
    obj: "Gestionarás ventas de exportación con control de inventario en SAP.",
    videos: []
  },
  {
    num: "11",
    label: "Vta 3r Expo - Solped / Traslado",
    obj: "Ejecutarás ventas a terceros de exportación con solicitud de pedido y traslado.",
    videos: []
  },
  {
    num: "12",
    label: "Vta 3r Expo - Solped / Compras",
    obj: "Gestionarás ventas a terceros de exportación con solicitud de pedido y compras.",
    videos: []
  },
  {
    num: "13",
    label: "Pedidos muestra",
    obj: "Crearás y gestionarás pedidos de muestra en SAP correctamente.",
    videos: []
  },
  {
    num: "14",
    label: "Existencia ficticia",
    obj: "Comprenderás y trabajarás con existencias ficticias en el sistema SAP.",
    videos: []
  },
  {
    num: "15",
    label: "Devoluciones INV con referencia",
    obj: "Procesarás devoluciones de inventario con referencia a documento original.",
    videos: []
  },
  {
    num: "16",
    label: "Devolución sin referencia",
    obj: "Gestionarás devoluciones sin referencia a documento en SAP.",
    videos: []
  },
  {
    num: "17",
    label: "NC por bonificación",
    obj: "Emitirás notas de crédito por bonificación dentro del sistema SAP.",
    videos: []
  },
  {
    num: "18",
    label: "Venta con anticipos",
    obj: "Procesarás ventas que incluyen anticipos o pagos adelantados en SAP.",
    videos: []
  },
  {
    num: "19",
    label: "Cancelaciones",
    obj: "Ejecutarás cancelaciones de documentos de venta en SAP de forma correcta.",
    videos: []
  },
  {
    num: "20",
    label: "Refacturación",
    obj: "Realizarás el proceso de refacturación de documentos en SAP.",
    videos: []
  },
  {
    num: "21",
    label: "Rebates",
    obj: "Configurarás y gestionarás acuerdos de rebates con clientes en SAP.",
    videos: []
  },
  {
    num: "22",
    label: "Intercompany",
    obj: "Gestionarás transacciones intercompany entre sociedades en SAP.",
    videos: []
  },
  {
    num: "23",
    label: "Catálogos",
    obj: "Administrarás y utilizarás catálogos de materiales en SAP.",
    videos: []
  },
  {
    num: "24",
    label: "Reg. Info cliente / material",
    obj: "Registrarás y consultarás información de clientes y materiales en SAP.",
    videos: []
  }
];

/* =====================================================
   LÓGICA DEL PORTAL (no modificar)
   ===================================================== */
const sidebarList = document.getElementById('sidebarList');
const mainTitle   = document.getElementById('mainTitle');
const objText     = document.getElementById('objText');
const videosSectionTitle = document.getElementById('videosSectionTitle');
const videoList   = document.getElementById('videoList');

function render(mod) {
  mainTitle.textContent = mod.label;
  objText.textContent   = mod.obj;

  if (mod.videos.length > 0) {
    videosSectionTitle.textContent = 'Videos del módulo';
    videoList.innerHTML = mod.videos.map((v, i) => `
      <a class="video-card" href="${v.url}" target="_blank" rel="noopener">
        <div class="video-play"><div class="play-tri"></div></div>
        <div class="video-info">
          <div class="video-name">${v.name}</div>
          <div class="video-meta">Video ${i + 1} · SharePoint</div>
        </div>
        <div class="video-arrow">›</div>
      </a>
    `).join('');
  } else {
    videosSectionTitle.textContent = '';
    videoList.innerHTML = `
      <div class="empty-state">
        <div class="empty-icon">🎬</div>
        Los videos de este módulo estarán disponibles próximamente.
      </div>`;
  }
}

modules.forEach((mod, i) => {
  const item = document.createElement('div');
  item.className = 'sidebar-item' + (i === 0 ? ' active' : '');
  const badge = mod.videos.length > 0
    ? `<span class="sidebar-badge">${mod.videos.length}</span>`
    : '';
  item.innerHTML = `
    <span class="sidebar-num">${mod.num}</span>
    <span class="sidebar-label">${mod.label}</span>
    ${badge}
  `;
  item.onclick = () => {
    document.querySelectorAll('.sidebar-item').forEach(el => el.classList.remove('active'));
    item.classList.add('active');
    render(mod);
  };
  sidebarList.appendChild(item);
});

render(modules[0]);
</script>
</body>
</html>
